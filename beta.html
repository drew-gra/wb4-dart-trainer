<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WB4 Dart Trainer</title>
  <!-- Privacy-friendly analytics by Plausible -->
  <script async src="https://plausible.io/js/pa-U8-aUnnw8KUKYtDzdjfeJ.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useContext, useCallback, useMemo, createContext, Fragment, useRef } = React;

    // ============================================================================
    // WB4 DART TRAINER - WITH CRICKET MODE
    // ============================================================================

    // CUSTOM HOOK: Session Manager
    const useSessionManager = () => {
      const [sessions, setSessions] = useState([]);

      useEffect(() => {
        const saved = localStorage.getItem('wb4UnifiedSessionHistory');
        if (saved) {
          try {
            setSessions(JSON.parse(saved));
          } catch (e) {
            console.error('Error loading sessions:', e);
          }
        }
      }, []);

      const addSession = (sessionData) => {
        setSessions(prev => {
          const updated = [sessionData, ...prev].slice(0, 100);
          localStorage.setItem('wb4UnifiedSessionHistory', JSON.stringify(updated));
          return updated;
        });
      };

      const clearSessions = () => {
        setSessions([]);
        localStorage.removeItem('wb4UnifiedSessionHistory');
      };

      return { sessions, addSession, clearSessions };
    };

    // MAIN COMPONENT
    const WB4DartTrainer = () => {
      const [currentMode, setCurrentMode] = useState(null);
      const [saveStatus, setSaveStatus] = useState('');
      const [confirmClear, setConfirmClear] = useState(false);
      const { sessions, addSession, clearSessions } = useSessionManager();
      const contentRef = useRef(null);
      const isInitialMount = useRef(true);

      const [diAttempts, setDiAttempts] = useState([]);
      const [diSessionStart, setDiSessionStart] = useState(null);
      const [diScoreInput, setDiScoreInput] = useState('');

      const [doAttempts, setDoAttempts] = useState([]);
      const [doSessionStart, setDoSessionStart] = useState(null);
      const [doCurrentTarget, setDoCurrentTarget] = useState(null);
      const [doConsecutiveFails, setDoConsecutiveFails] = useState(0);

      const [tpAttempts, setTpAttempts] = useState([]);
      const [tpSessionStart, setTpSessionStart] = useState(null);
      const [tpCurrentTarget, setTpCurrentTarget] = useState(null);

      // Cricket mode state
      const [ckHits, setCkHits] = useState({ 20: 0, 19: 0, 18: 0, 17: 0, 16: 0, 15: 0, Bull: 0 });
      const [ckTotalThrows, setCkTotalThrows] = useState(0);
      const [ckMissCount, setCkMissCount] = useState(0);
      const [ckGameStart, setCkGameStart] = useState(null);
      const [ckCompletedGames, setCkCompletedGames] = useState([]);
      const [ckPendingSelections, setCkPendingSelections] = useState([]);
      const [ckTargetData, setCkTargetData] = useState({}); // Track singles/doubles/triples per number

      const PRIORITY_DOUBLES = [16, 20, 8, 12];
      const TRIPLES_NUMBERS = [15, 16, 17, 18, 19, 20, 'Bull'];
      const CRICKET_WEIGHTS = { 15: 1, 16: 1, 17: 1, 18: 1, 19: 1, 20: 1, 'Bull': 0.2 };

      // MODES CONFIGURATION - Only training modes, History moved to bottom
      const TRAINING_MODES = [
        { id: 'double-in', label: 'DOUBLE-IN' },
        { id: 'double-out', label: 'DOUBLE-OUT' },
        { id: 'triples', label: 'TRIPLES' },
        { id: 'cricket', label: 'CRICKET' }
      ];

      // TRACKING HELPER
      const trackEvent = (eventName, props = {}) => {
        if (window.plausible) {
          window.plausible(eventName, { props });
        }
      };

      const handleModeChange = (mode) => {
        setCurrentMode(mode);
        trackEvent('Mode Changed', { mode });
      };

      // Scroll to content when mode changes (but not on initial load or when going to History/Insights)
      useEffect(() => {
        if (isInitialMount.current) {
          isInitialMount.current = false;
          return;
        }
        
        // Scroll to top for History, Insights, and landing page (null)
        if (currentMode === 'history' || currentMode === 'insights' || currentMode === null) {
          window.scrollTo({ top: 0, behavior: 'smooth' });
          return;
        }
        
        if (contentRef.current) {
          contentRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, [currentMode]);

      const showStatus = (msg, timeout = 2000) => {
        setSaveStatus(msg);
        setTimeout(() => setSaveStatus(''), timeout);
      };

      const calculateStats = (attempts) => {
        const total = attempts.length;
        const successes = attempts.filter(a => a.outcome === 'success').length;
        const rate = total > 0 ? Math.round((successes / total) * 100) : 0;
        return { total, successes, failures: total - successes, successRate: rate };
      };

      const calculateTriplesStats = (attempts) => {
        const total = attempts.length;
        const totalRounds = attempts.reduce((sum, a) => sum + (a.rounds || 0), 0);
        const avg = total > 0 ? (totalRounds / total).toFixed(2) : 0;
        return { total, totalRounds, avgRounds: avg };
      };

      const calculateCricketStats = (attempts) => {
        const total = attempts.length;
        const totalThrows = attempts.reduce((sum, a) => sum + (a.throws || 0), 0);
        const avgThrows = total > 0 ? (totalThrows / total).toFixed(1) : 0;
        const bestGame = total > 0 ? Math.min(...attempts.map(a => a.throws)) : 0;
        return { total, totalThrows, avgThrows, bestGame };
      };

      /*
       * ═══════════════════════════════════════════════════════════════
       * HEAT MAP DATA ARCHITECTURE (Option B - Aggregated per session)
       * ═══════════════════════════════════════════════════════════════
       * 
       * Current: We store aggregated targetData per session for efficiency.
       * Each session includes: { targetData: { 16: {attempts: 5, hits: 3}, ... } }
       * 
       * Valid data sources:
       * - Double-Out: App assigns target → knows attempts + outcomes
       * - Triples: App assigns target → knows rounds thrown at each target
       * - Cricket: User clicks specific buttons (T20, 20, D20) → knows exact hits
       * 
       * Invalid data sources (not included):
       * - Double-In: User chooses target → app cannot verify intent
       * 
       * FUTURE CONSIDERATION (Option A - Granular):
       * If we need individual attempt timestamps, streak analysis, or time-series
       * data in the future, consider migrating to:
       * { attempts: [{ target: 16, type: 'double', success: true, timestamp: ... }] }
       * 
       * Migration path: Keep Option B structure, add optional attempts[] array.
       * This allows backward compatibility while supporting granular tracking.
       * 
       * Estimated storage impact: ~150KB vs current ~20KB for 100 sessions
       * ═══════════════════════════════════════════════════════════════
       */

      // Aggregate attempts into targetData for heat map
      const buildDoubleOutTargetData = (attempts) => {
        const targetData = {};
        attempts.forEach(attempt => {
          const num = attempt.number;
          if (!targetData[num]) {
            targetData[num] = { attempts: 0, hits: 0 };
          }
          targetData[num].attempts++;
          if (attempt.outcome === 'success') {
            targetData[num].hits++;
          }
        });
        return targetData;
      };

      const buildTriplesTargetData = (attempts) => {
        const targetData = {};
        attempts.forEach(attempt => {
          const num = attempt.number;
          if (!targetData[num]) {
            targetData[num] = { attempts: 0, totalMarks: 0 };
          }
          targetData[num].attempts++;  // Count each 3-dart attempt
          targetData[num].totalMarks += attempt.rounds || 0;  // Sum the marks (confusingly called "rounds")
        });
        return targetData;
      };

      // Aggregate heat map data across all sessions
      const aggregateHeatMapData = () => {
        const aggregated = {};
        
        sessions.forEach(session => {
          // Only include sessions with location data (double-out, triples, and cricket)
          if (session.mode !== 'double-out' && session.mode !== 'triples' && session.mode !== 'cricket') return;
          if (!session.targetData) return;
          
          Object.entries(session.targetData).forEach(([num, data]) => {
            if (!aggregated[num]) {
              aggregated[num] = { attempts: 0, hits: 0, triplesAttempts: 0, totalMarks: 0 };
            }
            
            if (session.mode === 'double-out') {
              aggregated[num].attempts += data.attempts || 0;
              aggregated[num].hits += data.hits || 0;
            } else if (session.mode === 'triples') {
              aggregated[num].triplesAttempts += data.attempts || 0;  // Number of 3-dart attempts
              aggregated[num].totalMarks += data.totalMarks || 0;     // Sum of marks
            } else if (session.mode === 'cricket') {
              // Cricket provides direct counts of singles/doubles/triples hit
              // For doubles analysis: add to attempts and hits
              if (data.doubles > 0) {
                aggregated[num].attempts += data.doubles;
                aggregated[num].hits += data.doubles; // They hit what they aimed at
              }
              
              // For triples analysis: convert to marks and attempts
              // Each triple button press = 1 attempt at triple, worth 3 marks if hit
              if (data.triples > 0) {
                aggregated[num].triplesAttempts += data.triples;
                aggregated[num].totalMarks += data.triples * 3; // Each triple = 3 marks
              }
            }
          });
        });
        
        return aggregated;
      };

      // Regional analysis for insights
      const regions = {
        top: { name: 'Top', numbers: [5, 20, 1, 18, 4, 13] },
        right: { name: 'Right', numbers: [13, 6, 10, 15, 2, 17] },
        bottom: { name: 'Bottom', numbers: [17, 3, 19, 7, 16, 8] },
        left: { name: 'Left', numbers: [8, 11, 14, 9, 12, 5] }
      };

      const calculateRegionalAnalysis = () => {
        const heatData = aggregateHeatMapData();
        
        // Calculate effectiveness for a single number
        const getNumberEffectiveness = (num) => {
          const d = heatData[num];
          if (!d) return { doubleRate: 0, tripleRate: 0, totalWeight: 0 };
          
          const doubleRate = d.attempts > 0 ? (d.hits / d.attempts) * 100 : 0;
          const tripleMPR = d.triplesAttempts > 0 ? d.totalMarks / d.triplesAttempts : 0;
          const tripleRate = (tripleMPR / 9) * 100; // Normalize to percentage
          
          const totalWeight = d.attempts + d.triplesAttempts;
          
          return { doubleRate, tripleRate, totalWeight };
        };

        // Calculate regional score
        const getRegionalScore = (numbers) => {
          let totalWeightedScore = 0;
          let totalWeight = 0;

          numbers.forEach(num => {
            const { doubleRate, tripleRate, totalWeight: weight } = getNumberEffectiveness(num);
            const d = heatData[num];
            
            const doubleWeight = d?.attempts || 0;
            const tripleWeight = d?.triplesAttempts || 0;
            
            const numberScore = doubleWeight + tripleWeight > 0
              ? (doubleRate * doubleWeight + tripleRate * tripleWeight) / (doubleWeight + tripleWeight)
              : 0;
            
            totalWeightedScore += numberScore * weight;
            totalWeight += weight;
          });

          const regionalScore = totalWeight > 0 ? totalWeightedScore / totalWeight : 0;
          return { score: regionalScore, weight: totalWeight };
        };

        // Analyze all regions
        const analysis = {};
        Object.entries(regions).forEach(([key, region]) => {
          analysis[key] = {
            ...region,
            ...getRegionalScore(region.numbers)
          };
        });

        return analysis;
      };

      const calculateDataSufficiency = () => {
        const heatData = aggregateHeatMapData();
        const allNumbers = Object.keys(heatData);
        
        // Calculate total DARTS thrown (not attempts/turns)
        // Double-Out and Triples: each attempt = 1 turn = 3 darts
        // Cricket: each button press = 1 dart
        const totalDarts = allNumbers.reduce((sum, num) => {
          const d = heatData[num];
          const doubleOutDarts = (d?.attempts || 0) * 3;  // Each attempt = 3 darts
          const triplesDarts = (d?.triplesAttempts || 0) * 3;  // Each attempt = 3 darts
          // Cricket singles/doubles/triples are already individual darts
          return sum + doubleOutDarts + triplesDarts;
        }, 0);

        // Check per-region minimums (in darts)
        const regionData = {};
        Object.entries(regions).forEach(([key, region]) => {
          const darts = region.numbers.reduce((sum, num) => {
            const d = heatData[num];
            const doubleOutDarts = (d?.attempts || 0) * 3;
            const triplesDarts = (d?.triplesAttempts || 0) * 3;
            return sum + doubleOutDarts + triplesDarts;
          }, 0);
          regionData[key] = darts;
        });

        const minRegion = Math.min(...Object.values(regionData));
        const regionsWithData = Object.values(regionData).filter(a => a > 0).length;

        return {
          totalAttempts: totalDarts,  // Now in darts, not turns
          regionData,
          minRegion,
          regionsWithData,
          hasMinimum: totalDarts >= 360 && regionsWithData === 4 && minRegion >= 90,
          confidence: totalDarts < 360 ? 'insufficient' : 
                      totalDarts < 720 ? 'initial' : 
                      totalDarts < 1440 ? 'solid' : 'high'
        };
      };

      const generateDoubleOutTarget = () => {
        const weights = {};
        for (let i = 1; i <= 20; i++) {
          weights[i] = PRIORITY_DOUBLES.includes(i) ? 1.75 : 1;
        }
        if (doConsecutiveFails >= 4) {
          const bonus = Math.floor((doConsecutiveFails - 3) * 2);
          PRIORITY_DOUBLES.forEach(n => weights[n] += bonus);
        }
        const total = Object.values(weights).reduce((sum, w) => sum + w, 0);
        let rand = Math.random() * total;
        for (const [num, weight] of Object.entries(weights)) {
          rand -= weight;
          if (rand <= 0) return parseInt(num);
        }
        return 20;
      };

      const recordDoubleOut = (outcome) => {
        const now = new Date();
        if (doAttempts.length === 0) setDoSessionStart(now);

        const attempt = {
          number: doCurrentTarget,
          outcome,
          timestamp: now.toLocaleTimeString()
        };

        setDoAttempts(prev => [attempt, ...prev]);
        trackEvent('Attempt Recorded', { mode: 'double-out', outcome, target: doCurrentTarget });
        setDoConsecutiveFails(outcome === 'success' ? 0 : doConsecutiveFails + 1);
        setDoCurrentTarget(generateDoubleOutTarget());
        showStatus('💾 Saved', 1000);
      };

      const saveDoubleOutSession = () => {
        if (doAttempts.length === 0) return;
        
        const stats = calculateStats(doAttempts);
        const targetData = buildDoubleOutTargetData(doAttempts);
        const duration = Math.round((new Date() - doSessionStart) / 60000);
        
        addSession({
          id: Date.now(),
          mode: 'double-out',
          startTime: doSessionStart.toISOString(),
          endTime: new Date().toISOString(),
          duration,
          totalAttempts: stats.total,
          successRate: stats.successRate,
          successes: stats.successes,
          failures: stats.failures,
          targetData  // Heat map data
        });

        trackEvent('Training Session Completed', {
          mode: 'double-out',
          attempts: stats.total,
          successRate: stats.successRate,
          duration: duration
        });

        setDoAttempts([]);
        setDoSessionStart(null);
        setDoConsecutiveFails(0);
        setDoCurrentTarget(generateDoubleOutTarget());
        showStatus('📊 Session saved', 1500);
      };

      const recordDoubleIn = (outcome) => {
        const now = new Date();
        if (diAttempts.length === 0) setDiSessionStart(now);

        let score = null;
        if (outcome === 'success' && diScoreInput) {
          const val = parseInt(diScoreInput);
          if (val >= 2 && val <= 170) {
            score = val;
            setDiScoreInput('');
            trackEvent('Score Entered', { score: val, mode: 'double-in' });
          } else {
            showStatus('⚠️ Score must be 2-170', 2000);
            return;
          }
        }

        const attempt = { outcome, score, timestamp: now.toLocaleTimeString() };
        setDiAttempts(prev => [attempt, ...prev]);
        trackEvent('Attempt Recorded', { mode: 'double-in', outcome });
        showStatus('💾 Saved', 1000);
      };

      const saveDoubleInSession = () => {
        if (diAttempts.length === 0) return;

        const stats = calculateStats(diAttempts);
        const duration = Math.round((new Date() - diSessionStart) / 60000);
        const scores = diAttempts.filter(a => a.outcome === 'success' && a.score).map(a => a.score);
        const totalScore = scores.reduce((sum, s) => sum + s, 0);
        const expectedValue = diAttempts.length > 0 ? (totalScore / diAttempts.length).toFixed(1) : 0;

        addSession({
          id: Date.now(),
          mode: 'double-in',
          startTime: diSessionStart.toISOString(),
          endTime: new Date().toISOString(),
          duration,
          totalAttempts: stats.total,
          successRate: stats.successRate,
          successes: stats.successes,
          failures: stats.failures,
          expectedValue: parseFloat(expectedValue)
        });

        trackEvent('Training Session Completed', {
          mode: 'double-in',
          attempts: stats.total,
          successRate: stats.successRate,
          duration: duration
        });

        setDiAttempts([]);
        setDiSessionStart(null);
        showStatus('📊 Session saved', 1500);
      };

      const generateTriplesTarget = () => {
        const total = Object.values(CRICKET_WEIGHTS).reduce((sum, w) => sum + w, 0);
        let rand = Math.random() * total;
        for (const [num, weight] of Object.entries(CRICKET_WEIGHTS)) {
          rand -= weight;
          if (rand <= 0) return num === 'Bull' ? 'Bull' : parseInt(num);
        }
        return 20;
      };

      const recordTriples = (rounds) => {
        const now = new Date();
        if (tpAttempts.length === 0) setTpSessionStart(now);

        const attempt = {
          number: tpCurrentTarget,
          rounds,
          timestamp: now.toLocaleTimeString()
        };

        setTpAttempts(prev => [attempt, ...prev]);
        trackEvent('Attempt Recorded', { mode: 'triples', target: tpCurrentTarget, rounds });
        setTpCurrentTarget(generateTriplesTarget());
        showStatus('💾 Saved', 1000);
      };

      const saveTriplesSession = () => {
        if (tpAttempts.length === 0) return;

        const stats = calculateTriplesStats(tpAttempts);
        const targetData = buildTriplesTargetData(tpAttempts);
        const duration = Math.round((new Date() - tpSessionStart) / 60000);

        addSession({
          id: Date.now(),
          mode: 'triples',
          startTime: tpSessionStart.toISOString(),
          endTime: new Date().toISOString(),
          duration,
          totalAttempts: stats.total,
          totalRounds: stats.totalRounds,
          avgRounds: stats.avgRounds,
          targetData  // Heat map data
        });

        trackEvent('Training Session Completed', {
          mode: 'triples',
          attempts: stats.total,
          avgRounds: stats.avgRounds,
          duration: duration
        });

        setTpAttempts([]);
        setTpSessionStart(null);
        setTpCurrentTarget(generateTriplesTarget());
        showStatus('📊 Session saved', 1500);
      };

      // Cricket mode handlers
      const baseNumbers = [20, 19, 18, 17, 16, 15, 'Bull'];
      const totalHitsNeeded = 21;
      const ckCurrentHits = Object.values(ckHits).reduce((sum, count) => sum + count, 0);
      const ckIsComplete = ckCurrentHits >= totalHitsNeeded;
      
      const ckNumbers = useMemo(() => {
        const open = baseNumbers.filter(num => ckHits[num] < 3);
        const closed = baseNumbers.filter(num => ckHits[num] >= 3);
        return [...open, ...closed];
      }, [ckHits]);

      useEffect(() => {
        if (ckIsComplete && ckGameStart && ckTotalThrows > 0) {
          const now = new Date();
          const game = {
            throws: ckTotalThrows,
            timestamp: now.toLocaleTimeString(),
            date: now.toLocaleDateString()
          };
          
          const newGames = [game, ...ckCompletedGames];
          setCkCompletedGames(newGames);
          
          const duration = Math.round((now - ckGameStart) / 60000) || 1;
          const missRate = ckTotalThrows > 0 ? Math.round((ckMissCount / ckTotalThrows) * 100) : 0;
          
          // Calculate TB% (Triple and Bull percentage)
          const triplesCount = Object.entries(ckTargetData)
            .filter(([num]) => num !== 'Bull')
            .reduce((sum, [_, data]) => sum + (data.triples || 0), 0);
          const singleBulls = ckTargetData.Bull?.singles || 0;
          const doubleBulls = ckTargetData.Bull?.doubles || 0;
          const tbCount = triplesCount + singleBulls + doubleBulls;
          const tbRate = ckTotalThrows > 0 ? Math.round((tbCount / ckTotalThrows) * 100) : 0;
          
          addSession({
            id: Date.now(),
            mode: 'cricket',
            startTime: ckGameStart.toISOString(),
            endTime: now.toISOString(),
            duration,
            throws: ckTotalThrows,
            missRate: missRate,  // Miss% - already calculated
            tbRate: tbRate,      // TB% - triples and bulls percentage
            targetData: ckTargetData  // Heat map data
          });
          
          showStatus('🎯 Game Complete! Starting new game...', 2000);
          
          setTimeout(() => {
            setCkHits({ 20: 0, 19: 0, 18: 0, 17: 0, 16: 0, 15: 0, Bull: 0 });
            setCkTotalThrows(0);
            setCkMissCount(0);
            setCkGameStart(null);
            setCkPendingSelections([]);
            setCkTargetData({});  // Reset target data for new game
          }, 2000);
        }
      }, [ckIsComplete, ckGameStart, ckTotalThrows]);

      const handleCricketPendingHit = (number, count) => {
        if (ckPendingSelections.length >= 3) return;
        const remainingHits = 3 - ckHits[number];
        const actualHits = Math.min(count, remainingHits);
        if (actualHits > 0) {
          setCkPendingSelections(prev => [...prev, { number, count: actualHits, type: 'hit' }]);
        }
      };

      const handleCricketPendingMiss = () => {
        if (ckPendingSelections.length >= 3) return;
        setCkPendingSelections(prev => [...prev, { type: 'miss' }]);
      };

      const handleCricketSubmit = () => {
        if (ckPendingSelections.length === 0) return;
        if (!ckGameStart) setCkGameStart(new Date());
        
        const newHits = { ...ckHits };
        const missCount = ckPendingSelections.filter(s => s.type === 'miss').length;
        
        // Track targetData for heat map analysis
        const newTargetData = { ...ckTargetData };
        
        ckPendingSelections.forEach(selection => {
          if (selection.type === 'hit') {
            newHits[selection.number] = Math.min(3, newHits[selection.number] + selection.count);
            
            // Track what type of hit (single/double/triple)
            const num = selection.number;
            if (!newTargetData[num]) {
              newTargetData[num] = { singles: 0, doubles: 0, triples: 0 };
            }
            
            if (selection.count === 1) {
              newTargetData[num].singles++;
            } else if (selection.count === 2) {
              newTargetData[num].doubles++;
            } else if (selection.count === 3) {
              newTargetData[num].triples++;
            }
          }
        });
        
        setCkHits(newHits);
        setCkTargetData(newTargetData);
        setCkTotalThrows(prev => prev + ckPendingSelections.length);
        setCkMissCount(prev => prev + missCount);
        setCkPendingSelections([]);
        showStatus('✓ Saved', 800);
      };

      const handleCricketClear = () => {
        setCkPendingSelections([]);
      };

      const handleCricketNewGame = () => {
        setCkHits({ 20: 0, 19: 0, 18: 0, 17: 0, 16: 0, 15: 0, Bull: 0 });
        setCkTotalThrows(0);
        setCkMissCount(0);
        setCkGameStart(null);
        setCkPendingSelections([]);
        showStatus('🎯 New game started', 1000);
      };

      const ckGetRemainingHits = (num) => {
        return Math.max(0, 3 - ckHits[num]);
      };

      const ckIsPending = (number, count) => {
        return ckPendingSelections.some(s => s.type === 'hit' && s.number === number && s.count === count);
      };

      const ckIsMissPending = ckPendingSelections.some(s => s.type === 'miss');

      useEffect(() => {

                    // RECOMMENDATION - Enough data
                    <div className="rounded-lg p-6 border-2" style={{
                      background: 'linear-gradient(145deg, #374151, #1f2937)',
                      borderColor: '#fbbf24'
                    }}>
                      <h3 className="text-2xl font-bold mb-4 text-pink-400">💡 YOUR PRACTICE FOCUS</h3>
                      <p className="text-lg text-white mb-6">
                        The data says you need to work on {weakest[1].name === 'Top' ? 'the top of the board' : 
                                                           weakest[1].name === 'Right' ? 'the right side of the board' :
                                                           weakest[1].name === 'Bottom' ? 'the bottom of the board' :
                                                           'the left side of the board'}. Your efficiency there is {(() => {
                          const meanScore = sortedRegions.reduce((sum, r) => sum + r[1].score, 0) / sortedRegions.length;
                          const weakestDiff = ((meanScore - weakest[1].score) / meanScore) * 100;
                          return weakestDiff.toFixed(0);
                        })()}% lower than everyplace else on the board.
                        <br/><br/>
                        Your strongest area is {strongest[1].name === 'Top' ? 'the top of the board' : 
                                                strongest[1].name === 'Right' ? 'the right side of the board' :
                                                strongest[1].name === 'Bottom' ? 'the bottom of the board' :
                                                'the left side of the board'}, where your efficiency is {(() => {
                          const meanScore = sortedRegions.reduce((sum, r) => sum + r[1].score, 0) / sortedRegions.length;
                          const strongestDiff = ((strongest[1].score - meanScore) / meanScore) * 100;
                          return strongestDiff.toFixed(0);
                        })()}% greater than the other areas.
                      </p>
                      <button 
                        className="w-full py-3 px-4 rounded-lg font-bold text-base transition-all border-2"
                        style={{
                          backgroundColor: '#1f2937',
                          borderColor: '#fbbf24',
                          color: '#9ca3af',
                          cursor: 'not-allowed'
                        }}
                        disabled
                      >
                        🎯 TARGETED PRACTICE MODE (COMING SOON)
                      </button>
                    </div>
                  )}
                  
                  {/* Back button */}
                  <button
                    onClick={() => {
                      handleModeChange(null);
                      setTimeout(() => {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                      }, 50);
                    }}
                    className="w-full py-4 px-6 rounded-lg font-bold text-base transition-all transform hover:scale-105 shadow-lg bg-purple-600 text-gray-300 border-2 border-gray-300 hover:bg-purple-700 mt-8"
                  >
                    ← BACK TO TRAINING
                  </button>
                </>
              );
            })()}

            {/* HISTORY VIEW */}
            {currentMode === 'history' && (
              <>
                <div className="bg-gray-900 rounded-lg p-4 mb-8 border border-gray-800">
                  <h3 className="text-lg font-bold mb-3 text-pink-400">📊 OVERALL STATS</h3>
                  <div className="grid grid-cols-2 gap-4 text-center">
                    <div><div className="text-2xl font-bold text-blue-400">{sessions.filter(s => s.mode === 'double-in').length}</div><div className="text-sm text-gray-300 font-medium">DOUBLE-IN</div></div>
                    <div><div className="text-2xl font-bold text-green-400">{sessions.filter(s => s.mode === 'double-out').length}</div><div className="text-sm text-gray-300 font-medium">DOUBLE-OUT</div></div>
                    <div><div className="text-2xl font-bold text-purple-400">{sessions.filter(s => s.mode === 'triples').length}</div><div className="text-sm text-gray-300 font-medium">TRIPLES</div></div>
                    <div><div className="text-2xl font-bold text-pink-400">{sessions.filter(s => s.mode === 'cricket').length}</div><div className="text-sm text-gray-300 font-medium">CRICKET</div></div>
                  </div>
                </div>

                {sessions.length > 0 ? (
                  <div className="bg-gray-900 rounded-lg p-4 mb-8 border border-gray-800">
                    <h3 className="text-lg font-bold mb-3 text-pink-400">📈 SESSION HISTORY</h3>
                    <div className="space-y-2 max-h-96 overflow-y-auto">
                      {sessions.map((s, idx) => {
                        const colors = {
                          'double-in': 'bg-blue-600',
                          'double-out': 'bg-green-600',
                          'triples': 'bg-purple-600',
                          'cricket': 'bg-pink-600'
                        };
                        const labels = {
                          'double-in': 'DOUBLE-IN',
                          'double-out': 'DOUBLE-OUT',
                          'triples': 'TRIPLES',
                          'cricket': 'CRICKET'
                        };
                        
                        const endDateTime = new Date(s.endTime);
                        const dateStr = endDateTime.toLocaleDateString();
                        const timeStr = endDateTime.toLocaleTimeString();
                        
                        return (
                          <div key={s.id} className="bg-gray-800 p-3 rounded">
                            <div className="flex justify-between items-start">
                              {/* Left side - 3 rows */}
                              <div className="flex flex-col">
                                <span className={`${colors[s.mode]} text-white text-xs font-bold px-2 py-1 rounded mb-1 w-fit`}>{labels[s.mode]}</span>
                                <span className="text-gray-400 text-xs">{dateStr}</span>
                                <span className="text-gray-400 text-xs">{timeStr}</span>
                              </div>
                              {/* Right side - 2 or 3 rows */}
                              <div className="text-right">
                                {s.mode === 'cricket' ? (
                                  <>
                                    <div className="text-white text-sm font-semibold">Closing Speed: {s.throws} darts</div>
                                    <div className="text-gray-400 text-xs">{s.missRate || 0}% miss rate</div>
                                  </>
                                ) : s.mode === 'triples' ? (
                                  <>
                                    <div className="text-white text-sm font-semibold">{s.avgRounds} MPR</div>
                                    <div className="text-gray-400 text-xs">{s.totalAttempts} attempts</div>
                                  </>
                                ) : s.mode === 'double-out' ? (
                                  <>
                                    <div className="text-white text-sm font-semibold">{s.successRate}% check-out rate</div>
                                    <div className="text-gray-400 text-xs">{s.totalAttempts} attempts</div>
                                  </>
                                ) : (
                                  <>
                                    <div className="text-white text-sm font-semibold">{s.successRate}% double-in rate</div>
                                    <div className="text-gray-400 text-xs">{s.totalAttempts} attempts</div>
                                    <div className="text-gray-400 text-xs">avg score: {s.expectedValue}</div>
                                  </>
                                )}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <p className="text-xs text-gray-500 mt-3">Your last 100 sessions are saved. Use the same device to practice.</p>
                  </div>
                ) : (
                  <div className="bg-gray-900 rounded-lg p-8 text-center mb-8 border border-gray-800">
                    <p className="text-gray-400 text-sm">No sessions yet. Complete a training session to see it here!</p>
                  </div>
                )}

                <div className="bg-gray-900 rounded-lg p-4 mb-8 border border-gray-800">
                  <div className="flex items-start mb-3">
                    <input type="checkbox" id="confirmClear" checked={confirmClear} onChange={(e) => setConfirmClear(e.target.checked)} className="mt-1 mr-3 w-5 h-5 cursor-pointer" />
                    <label htmlFor="confirmClear" className="text-sm text-gray-300 cursor-pointer">Delete all session history and start again.</label>
                  </div>
                  <button onClick={clearAllData} disabled={!confirmClear} className={`w-full font-black py-3 px-6 rounded-lg transition-all border-2 shadow-lg ${confirmClear ? 'bg-pink-600 hover:bg-pink-700 text-white border-pink-500 transform hover:scale-105 cursor-pointer' : 'bg-gray-700 text-gray-500 border-gray-600 cursor-not-allowed opacity-50'}`} style={confirmClear ? {textShadow: '2px 2px 4px rgba(0,0,0,0.8)'} : {}}>
                    🧹 CLEAR ALL PRACTICE DATA
                  </button>
                </div>

                {/* Back button */}
                <button
                  onClick={() => {
                    handleModeChange(null);
                    setTimeout(() => {
                      window.scrollTo({ top: 0, behavior: 'smooth' });
                    }, 50);
                  }}
                  className="w-full py-4 px-6 rounded-lg font-bold text-base transition-all transform hover:scale-105 shadow-lg bg-purple-600 text-gray-300 border-2 border-gray-300 hover:bg-purple-700 mb-8"
                >
                  ← BACK TO TRAINING
                </button>
              </>
            )}

            {/* STATS SECTION - More breathing room */}
            {(currentMode === 'double-in' || currentMode === 'double-out' || currentMode === 'triples') && (
              <div className="bg-gray-900 rounded-lg p-4 mb-8 border border-gray-800">
                <h3 className="text-lg font-bold mb-3 text-pink-400">📊 STATS</h3>
                {currentMode === 'triples' ? (
                  <div className="grid grid-cols-2 gap-4 text-center">
                    <div><div className="text-2xl font-bold text-yellow-400">{getCurrentStats().total}</div><div className="text-sm text-gray-300 font-medium">TOTAL ATTEMPTS</div></div>
                    <div><div className="text-2xl font-bold" style={goldGradient}>{getCurrentStats().avgRounds}</div><div className="text-sm text-gray-300 font-medium">AVG ROUNDS</div></div>
                  </div>
                ) : (
                  <div className="grid grid-cols-2 gap-4 text-center">
                    <div><div className="text-2xl font-bold text-yellow-400">{getCurrentStats().total}</div><div className="text-sm text-gray-300 font-medium">TOTAL ATTEMPTS</div></div>
                    <div><div className="text-2xl font-bold" style={goldGradient}>{getCurrentStats().successRate}%</div><div className="text-sm text-gray-300 font-medium">SUCCESS RATE</div></div>
                    <div><div className="text-2xl font-bold text-green-400">{getCurrentStats().successes}</div><div className="text-sm text-gray-300 font-medium">{currentMode === 'double-out' ? 'GOT OUT' : 'GOT IN'}</div></div>
                    <div><div className="text-2xl font-bold text-red-400">{getCurrentStats().failures}</div><div className="text-sm text-gray-300 font-medium">MISS</div></div>
                  </div>
                )}
              </div>
            )}

            {/* RECENT ATTEMPTS - More breathing room */}
            {(currentMode === 'double-in' || currentMode === 'double-out' || currentMode === 'triples') && getCurrentAttempts().length > 0 && (
              <div className="bg-gray-900 rounded-lg p-4 mb-8 border border-gray-800">
                <h3 className="text-lg font-bold mb-3 text-pink-400">📝 RECENT {currentMode === 'triples' ? 'THROWS' : currentMode === 'double-out' ? 'ATTEMPTS' : 'INS'}</h3>
                <div className="space-y-2 max-h-40 overflow-y-auto">
                  {getCurrentAttempts().slice(0, 10).map((a, i) => (
                    <div key={i} className="flex justify-between items-center text-sm bg-gray-800 p-2 rounded">
                      <span className="text-yellow-400 font-semibold">
                        {currentMode === 'triples' ? a.number : currentMode === 'double-out' ? `D${a.number}` : (a.outcome === 'success' && a.score ? `Score: ${a.score}` : 'DOUBLE IN')}
                      </span>
                      <span className={`font-semibold ${currentMode === 'triples' ? 'text-blue-400' : a.outcome === 'success' ? 'text-green-400' : 'text-red-400'}`}>
                        {currentMode === 'triples' ? (a.rounds === 0 ? '❌ MISS' : `✅ ${a.number === 'Bull' ? 'C' : 'R'}${a.rounds}`) : (a.outcome === 'success' ? (currentMode === 'double-out' ? '✅' : '✅ GOT IN') : (currentMode === 'double-out' ? '❌' : '❌ MISSED'))}
                      </span>
                      <span className="text-gray-400 text-xs">{a.timestamp}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* SAVE STATUS */}
            {saveStatus && (
              <div className="bg-gray-900 rounded-lg p-4 mb-8 border border-gray-800">
                <div className="text-xs text-center text-yellow-300 font-semibold">{saveStatus}</div>
              </div>
            )}

            {/* INSIGHTS & HISTORY BUTTONS - Now at bottom, side by side */}
            {currentMode !== 'history' && currentMode !== 'insights' && (
              <div className="grid grid-cols-2 gap-4 mb-8">
                <button
                  onClick={() => handleModeChange('insights')}
                  className="w-full py-4 px-6 rounded-lg font-bold text-base transition-all transform hover:scale-105 shadow-lg bg-purple-600 text-gray-300 border-2 border-gray-300 hover:bg-purple-700"
                >
                  💡 INSIGHTS
                </button>
                <button
                  onClick={() => handleModeChange('history')}
                  className="w-full py-4 px-6 rounded-lg font-bold text-base transition-all transform hover:scale-105 shadow-lg bg-purple-600 text-gray-300 border-2 border-gray-300 hover:bg-purple-700"
                >
                  📊 HISTORY
                </button>
              </div>
            )}

            {/* FOOTER */}
            <div className="text-center mt-12 mb-12">
              <div className="text-4xl" style={{letterSpacing: '0.5em'}}>🤜👈</div>
            </div>
            <div className="text-center text-yellow-400 text-xs font-semibold leading-tight">
              <p>All rights reserved</p>
              <p>Flatbush vs. Everybody</p>
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.render(<WB4DartTrainer />, document.getElementById('root'));
  </script>
</body>
</html>
